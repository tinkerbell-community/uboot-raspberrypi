name: Build and Release U-Boot Raspberry Pi Image

on:
  workflow_dispatch:
    inputs:
      uboot_version:
        description: "U-Boot version tag to build"
        required: false
        type: string
      rpi_firmware_version:
        description: "Raspberry Pi firmware version"
        required: false
        type: string
      rpi_kernel_version:
        description: "Raspberry Pi kernel version tag for building device tree files"
        required: false
        type: string
  push:
    tags:
      - 'v*'

env:
  UBOOT_VERSION: ${{ inputs.uboot_version || 'v2026.04-rc4' }}
  UBOOT_DIR: ${{ github.workspace }}/u-boot
  RPI_FIRMWARE_VERSION: ${{ inputs.rpi_firmware_version || 'next' }}
  RPI_KERNEL_VERSION: ${{ inputs.rpi_kernel_version || 'stable_20250428' }}

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to get all tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag with U-Boot version prefix
        id: previoustag
        uses: WyriHaximus/github-action-get-previous-tag@v1
        continue-on-error: true
        with:
          prefix: ${{ env.UBOOT_VERSION }}

      - name: Calculate next version
        id: version
        run: |
          UBOOT_VER="${{ env.UBOOT_VERSION }}"

          # Check if we got a previous tag
          if [ "${{ steps.previoustag.outcome }}" == "success" ] && [ -n "${{ steps.previoustag.outputs.tag }}" ]; then
            PREV_TAG="${{ steps.previoustag.outputs.tag }}"
            echo "Found previous tag: $PREV_TAG"

            # Extract version numbers (remove 'v' prefix if present)
            PREV_VERSION="${PREV_TAG#v}"

            # Split into parts
            IFS='.' read -ra PARTS <<< "$PREV_VERSION"
            MAJOR="${PARTS[0]}"
            MINOR="${PARTS[1]}"
            PATCH="${PARTS[2]:-0}"

            # Increment patch version
            NEW_PATCH=$((PATCH + 1))
            RELEASE_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

            echo "Incremented from $PREV_VERSION to $RELEASE_VERSION"
          else
            # No previous tag found, start with .0
            RELEASE_VERSION="${UBOOT_VER#v}.0"
            echo "No previous tag found, starting with $RELEASE_VERSION"
          fi

          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "Final release version: $RELEASE_VERSION"

  build-uboot:
    needs: determine-version
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        config:
          - name: rpi_arm64
            path: u-boot.bin
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: src
          ref: ${{ github.ref }}

      - name: Checkout u-boot
        uses: actions/checkout@v4
        with:
          repository: u-boot/u-boot
          fetch-depth: 1
          path: u-boot
          ref: ${{ env.UBOOT_VERSION }}

      - name: Cache and install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential git bison flex bc libssl-dev libgnutls28-dev device-tree-compiler
          version: 1.0

      - name: Configure U-Boot for Raspberry Pi 4 ARM64
        working-directory: u-boot
        run: |
          patch -p1 < ${{ github.workspace }}/src/patches/rpi_arm64_defconfig.patch
          make rpi_arm64_defconfig

          echo "CONFIG_SERVERIP_FROM_PROXYDHCP=y" >> .config
          echo "CONFIG_BOOTP_SEND_HOSTNAME=y" >> .config
          echo "CONFIG_BOOTP_DNS2=y" >> .config
          echo "CONFIG_BOOTP_NTPSERVER=y" >> .config

          echo "CONFIG_OPTEE=y" >> .config
          echo "CONFIG_CMD_OPTEE_RPMB=y" >> .config
          echo "CONFIG_EFI_MM_COMM_TEE=y" >> .config

      - name: Configure Expo Menu
        working-directory: u-boot
        run: |
          echo "CONFIG_BOOTSTD_FULL=y" >> .config
          echo "CONFIG_BOOTSTD_BOOTCOMMAND=y" >> .config
          echo "CONFIG_EXPO=y" >> .config
          echo "CONFIG_BOOTSTD_MENU=y" >> .config
          # echo "CONFIG_CEDIT=y" >> .config
          echo "CONFIG_CMD_BOOTMENU=y" >> .config
          echo "CONFIG_CMD_BOOTFLOW_FULL=y" >> .config
          echo "CONFIG_AUTOBOOT_MENU_SHOW=y" >> .config

      - name: Build U-Boot
        working-directory: u-boot
        run: |
          make -j $(nproc) HOSTLDLIBS_mkimage="-lssl -lcrypto"
          ls -la u-boot.bin

      - name: Upload U-Boot binary
        uses: actions/upload-artifact@v4
        with:
          name: uboot-binary
          path: u-boot/u-boot.bin
          retention-days: 1
          if-no-files-found: error

  checkout-firmware:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Raspberry Pi firmware
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/firmware
          fetch-depth: 1
          path: firmware
          ref: ${{ env.RPI_FIRMWARE_VERSION }}

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: rpi-firmware
          path: |
            firmware/boot/
            !firmware/boot/kernel*
            !firmware/boot/bcm27*
          retention-days: 1
          if-no-files-found: error

  build-ipxe-arm64:
    needs: determine-version
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4
        with:
          repository: ipxe/ipxe
          ref: master
          path: ipxe
          fetch-depth: 1

      - name: Cache and install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential git liblzma-dev
          version: 1.0

      - name: Get iPXE commit hash
        id: ipxe_commit
        working-directory: ipxe
        run: |
          commit_short=$(git rev-parse --short=7 HEAD)
          echo "commit_short=${commit_short}" >> $GITHUB_OUTPUT
          echo "iPXE commit: ${commit_short}"

      - name: Build iPXE for ARM64 Raspberry Pi
        working-directory: ipxe/src
        run: |
          # Create embedded script
          cat <<EOF | tee embedded.ipxe
          #!ipxe

          set user-class Tinkerbell
          echo Welcome to Neverland!

          :iterate-interfaces
          set idx:int32 0
          :interfaces-loop
          isset \${net\${idx}/ip} && goto interfaces-loop-done || iseq \${idx} 50 && goto autoboot || inc idx && goto interfaces-loop

          :interfaces-loop-done
          echo Booting from net\${idx}...
          set retry-max:int32 2
          set count:int32 1
          :retry-loop1
          echo trying dhcp ( attempt \${count}/\${retry-max} )
          dhcp net\${idx} && goto done1 || iseq \${count} \${retry-max} && goto done1 || inc count && goto retry-loop1
          :done1
          autoboot net\${idx} || exit 1

          :autoboot
          set retry-max:int32 2
          set count:int32 1
          :retry-loop2
          echo trying dhcp ( attempt \${count}/\${retry-max} )
          dhcp && goto done2 || iseq \${count} \${retry-max} && goto done2 || inc count && goto retry-loop2
          :done2
          autoboot || exit 1
          EOF

          # Create config file to enable TFTP
          cat <<EOF | tee config/rpi/general.h
          #define CERT_CMD              /* Certificate management commands */
          #define DIGEST_CMD            /* Image crypto digest commands */
          #define DOWNLOAD_PROTO_TFTP   /* Trivial File Transfer Protocol */
          #define DOWNLOAD_PROTO_HTTPS  /* Secure Hypertext Transfer Protocol */
          #define IMAGE_TRUST_CMD       /* Image trust management commands */
          #define NET_PROTO_IPV6        /* IPv6 protocol */
          #define NSLOOKUP_CMD          /* DNS resolving command */
          #define NTP_CMD               /* NTP commands */
          #define NVO_CMD               /* Non-volatile option storage commands */
          #define PARAM_CMD             /* params and param commands, for POSTing to tink */
          #define PING_CMD              /* Ping command */
          #define POWEROFF_CMD          /* Power off command */
          #define REBOOT_CMD            /* Reboot command */
          #define SANBOOT_PROTO_HTTP    /* HTTP SAN protocol */
          #define VLAN_CMD              /* VLAN commands */
          #define DOWNLOAD_PROTO_NFS    /* NFS */
          #define ROUTE_CMD             /* Routing table management commands */
          #define NET_PROTO_LACP        /* Link Aggregation control protocol */

          #undef CRYPTO_80211_WEP       /* WEP encryption (deprecated and insecure!) */
          #undef CRYPTO_80211_WPA2      /* Add support for stronger WPA cryptography */
          #undef CRYPTO_80211_WPA       /* WPA Personal, authenticating with passphrase */
          #undef FCMGMT_CMD             /* Fibre Channel management commands */
          #undef IBMGMT_CMD             /* Infiniband management commands */
          #undef IMAGE_PNG              /* PNG image support */
          #undef IMAGE_PNM              /* PNM image support */
          #undef IWMGMT_CMD             /* Wireless interface management commands */
          #undef NET_PROTO_STP          /* Spanning Tree protocol */
          #undef VNIC_IPOIB             /* Infiniband IPoIB virtual NICs */

          //defined in config/defaults/{efi,pcbios}.h and we don't want
          #undef SANBOOT_PROTO_AOE      /* AoE protocol */
          #undef SANBOOT_PROTO_FCP      /* Fibre Channel protocol */
          #undef SANBOOT_PROTO_IB_SRP   /* Infiniband SCSI RDMA protocol */
          #undef SANBOOT_PROTO_ISCSI    /* iSCSI protocol */
          #undef USB_EFI                /* Provide EFI_USB_IO_PROTOCOL interface */
          #undef USB_HCD_EHCI           /* EHCI USB host controller */
          #undef USB_HCD_UHCI           /* UHCI USB host controller */
          #undef USB_HCD_XHCI           /* xHCI USB host controller */
          #undef USB_KEYBOARD           /* USB keyboards */

          #undef NAP_EFIX86
          #undef NAP_EFIARM
          #define NAP_NULL
          EOF

          cat <<EOF | tee config/rpi/crypto.h
          #undef OCSP_CHECK
          EOF

          # Build with proper version variables
          make VERSION_MAJOR=1 VERSION_MINOR=21 VERSION_PATCH=1 EXTRAVERSION="+ (${{ steps.ipxe_commit.outputs.commit_short }})" CONFIG=rpi EMBED=embedded.ipxe -j $(nproc) bin-arm64-efi/snp.efi
          ls -lah bin-arm64-efi/snp.efi

      - name: Upload iPXE binary
        uses: actions/upload-artifact@v4
        with:
          name: ipxe-arm64-binary
          path: ipxe/src/bin-arm64-efi/snp.efi
          retention-days: 1
          overwrite: true
          if-no-files-found: error

  prepare-config:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload config.txt
        uses: actions/upload-artifact@v4
        with:
          name: config-files
          path: config.txt
          retention-days: 1
          overwrite: true
          if-no-files-found: error

  build-kernel-dtbs:
    needs: determine-version
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: src

      - name: Cache and install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential cpp device-tree-compiler
          version: 1.0

      - name: Download and patch Raspberry Pi kernel source
        run: |
          echo "Downloading raspberrypi/linux tag: ${{ env.RPI_KERNEL_VERSION }}"
          curl -sL "https://github.com/raspberrypi/linux/archive/refs/tags/${{ env.RPI_KERNEL_VERSION }}.tar.gz" -o rpi-linux.tar.gz
          tar xf rpi-linux.tar.gz --strip-components=1
          rm rpi-linux.tar.gz

          for patch in $(find src/patches/dtb -type f -name '*.patch' | sort); do
            echo "Applying patch $patch"
            patch -p1 < "$patch" || (echo "Failed to apply patch $patch" && exit 1)
          done

      - name: Build device tree binaries
        run: |
          mkdir -p out

          export DTC_FLAGS="-R 4 -p 0x1000 -@ -H epapr"
          for dts in arch/arm64/boot/dts/broadcom/bcm27*.dts; do
            target=$(basename "${dts%*.dts}")
            echo "Building $target.dtb"
            cpp -nostdinc -I include -I arch -undef -x assembler-with-cpp \
              -I scripts/dtc/include-prefixes/ -D__DTS__ -DFIRMWARE_UPDATED \
              -P "$dts" -o "out/$target.dts"
            dtc -O dtb $DTC_FLAGS -o "out/$target.dtb" "out/$target.dts"
          done

          echo "Built device tree files:"
          ls -lah out/*.dtb

          if [ -z "$(ls out/bcm2712*.dtb 2>/dev/null)" ]; then
            echo "ERROR: No bcm2712* device tree files built"
            exit 1
          fi

      - name: Upload kernel device tree files
        uses: actions/upload-artifact@v4
        with:
          name: kernel-dts
          path: out/*.dtb
          retention-days: 1
          if-no-files-found: error

  build-edk2-mm:
    needs: determine-version
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Cache and install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential clang lld llvm git uuid-dev iasl python3-pyelftools
          version: 1.4

      - name: Cache git folder
        uses: actions/cache@v3
        with:
          path: edk2/.git
          key: edk2-git

      - name: Checkout EDK2
        uses: actions/checkout@v4
        with:
          repository: tianocore/edk2
          path: edk2
          fetch-depth: 1
          submodules: recursive

      - name: Checkout EDK2 Platforms
        uses: actions/checkout@v4
        with:
          repository: tianocore/edk2-platforms
          path: edk2-platforms
          fetch-depth: 1

      - name: Build EDK2 StandaloneMM RPMB
        run: |
          export WORKSPACE=$(pwd)
          export PACKAGES_PATH=$WORKSPACE/edk2:$WORKSPACE/edk2-platforms
          export ACTIVE_PLATFORM="Platform/StandaloneMm/PlatformStandaloneMmPkg/PlatformStandaloneMmRpmb.dsc"

          # Build BaseTools (host tools) with native gcc
          PATH="/usr/bin:/bin:/usr/sbin:/sbin" make -C edk2/BaseTools -j $(nproc) \
            CC=gcc CXX=g++ AR=/usr/bin/ar RANLIB=/usr/bin/ranlib

          source edk2/edksetup.sh

          # Use CLANGDWARF to avoid GCC 13+ LTO incompatibility with mbedtls inline asm.
          # On native aarch64 runner, clang targets the host arch directly — no cross-prefix.
          export CLANGDWARF_AARCH64_PREFIX=""
          build -p $ACTIVE_PLATFORM -b RELEASE -a AARCH64 -t CLANGDWARF -n $(nproc)

          # Verify output
          ls -lah Build/MmStandaloneRpmb/RELEASE_CLANGDWARF/FV/BL32_AP_MM.fd

      - name: Upload EDK2 StandaloneMM binary
        uses: actions/upload-artifact@v4
        with:
          name: edk2-mm-binary
          path: Build/MmStandaloneRpmb/RELEASE_CLANGDWARF/FV/BL32_AP_MM.fd
          retention-days: 1
          if-no-files-found: error

  build-optee:
    needs: [determine-version, build-edk2-mm]
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        platform:
          - name: rpi3
            artifact_suffix: rpi4
          - name: rpi5
            artifact_suffix: rpi5
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: src
      - name: Cache and install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential git python3-cryptography gcc-arm-linux-gnueabihf python3-pyelftools
          version: 1.1

      - name: Download EDK2 StandaloneMM binary
        uses: actions/download-artifact@v4
        with:
          name: edk2-mm-binary
          path: edk2-mm

      - name: Checkout OP-TEE OS
        uses: actions/checkout@v4
        with:
          repository: OP-TEE/optee_os
          path: optee_os
          fetch-depth: 1

      - name: Apply OP-TEE platform patches
        working-directory: optee_os
        run: |
          for patch in $(find ${{ github.workspace }}/src/patches/optee -type f -name '*.patch' | sort); do
            echo "Applying patch $patch"
            patch -p1 < "$patch" || (echo "Failed to apply patch $patch" && exit 1)
          done

      - name: Build OP-TEE OS with StandaloneMM
        working-directory: optee_os
        run: |
          # Use absolute path for StandaloneMM binary
          STMM_PATH=$(realpath ../edk2-mm/BL32_AP_MM.fd)

          # Build OP-TEE as BL32 for TF-A integration.
          # CFG_WITH_ARM_TRUSTED_FW=y: OP-TEE runs at S-EL1 under TF-A's EL3.
          # TF-A launches OP-TEE, which initializes secure world services,
          # then returns to TF-A via SMC. TF-A then jumps to BL33 (U-Boot).
          make -j$(nproc) \
            ARCH=arm \
            CFG_ARM64_core=y \
            CROSS_COMPILE=arm-linux-gnueabihf- \
            PLATFORM=${{ matrix.platform.name }} \
            CFG_WITH_ARM_TRUSTED_FW=y \
            CFG_STMM_PATH=${STMM_PATH} \
            CFG_RPMB_FS=y \
            CFG_RPMB_FS_DEV_ID=0 \
            CFG_CORE_HEAP_SIZE=524288 \
            CFG_RPMB_WRITE_KEY=y \
            CFG_CORE_DYN_SHM=y \
            CFG_RPMB_TESTKEY=y \
            CFG_REE_FS=n \
            CFG_CORE_ARM64_PA_BITS=48 \
            CFG_TEE_CORE_LOG_LEVEL=1 \
            CFG_TEE_TA_LOG_LEVEL=1 \
            CFG_SCTLR_ALIGNMENT_CHECK=n

          # Verify output — tee.bin gets concatenated into the TF-A armstub
          echo "OP-TEE build outputs:"
          ls -lah out/arm-plat-${{ matrix.platform.name }}/core/tee.bin

      - name: Upload OP-TEE binary
        uses: actions/upload-artifact@v4
        with:
          name: optee-binary-${{ matrix.platform.artifact_suffix }}
          path: optee_os/out/arm-plat-${{ matrix.platform.name }}/core/tee.bin
          retention-days: 1
          if-no-files-found: error

  build-tfa:
    needs: [determine-version, build-optee]
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        platform:
          - tfa_plat: rpi4
            optee_suffix: rpi4
            artifact_suffix: rpi4
          - tfa_plat: rpi5
            optee_suffix: rpi5
            artifact_suffix: rpi5
    permissions:
      contents: read

    steps:
      - name: Cache and install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential git gcc-aarch64-linux-gnu python3-pyelftools
          version: 1.0

      - name: Download OP-TEE binary
        uses: actions/download-artifact@v4
        with:
          name: optee-binary-${{ matrix.platform.optee_suffix }}
          path: optee

      - name: Checkout ARM Trusted Firmware
        uses: actions/checkout@v4
        with:
          repository: ARM-software/arm-trusted-firmware
          path: arm-trusted-firmware
          fetch-depth: 1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: src

      - name: Apply patched rpi4_bl31_setup.c
        working-directory: arm-trusted-firmware
        run: |
          patch -p1 < ${{ github.workspace }}/src/patches/tfa.patch
          echo "Applied TF-A patches"

      - name: Build TF-A (RESET_TO_BL31)
        working-directory: arm-trusted-firmware
        run: |
          PLAT=${{ matrix.platform.tfa_plat }}

          # Build BL31 with opteed dispatcher for RESET_TO_BL31 platforms.
          # The patched rpi4_bl31_setup.c handles OP-TEE loading at runtime
          # via memcpy from armstub offset 0x20000, so no FIP or BL32/BL33
          # build arguments are needed.
          # U-Boot (BL33) is loaded separately by GPU firmware as "kernel".
          make PLAT=${PLAT} \
            SPD=opteed \
            DEBUG=1 \
            -j$(nproc) \
            all

          echo "TF-A build outputs:"
          find build/${PLAT}/debug/ -name '*.bin' -ls

      - name: Create armstub (BL31 + OP-TEE)
        working-directory: arm-trusted-firmware
        run: |
          PLAT=${{ matrix.platform.tfa_plat }}
          BUILD_DIR=build/${PLAT}/debug

          # Concatenate: bl31.bin (padded to 128KB/0x20000) + tee.bin → armstub8.bin
          # GPU firmware loads armstub to address 0x0, so OP-TEE lands at
          # physical address 0x20000. The patched rpi4_bl31_setup.c does
          # memcpy(0x10100000, 0x20000, 500KB) to copy it to secure DRAM.
          echo "Creating armstub: bl31.bin (pad to 128KB) + tee.bin"
          cp ${BUILD_DIR}/bl31.bin ${BUILD_DIR}/armstub8.bin
          truncate --size=131072 ${BUILD_DIR}/armstub8.bin
          cat ../optee/tee.bin >> ${BUILD_DIR}/armstub8.bin
          echo "Created armstub8.bin ($(stat -c%s ${BUILD_DIR}/armstub8.bin) bytes)"
          ls -lah ${BUILD_DIR}/armstub8.bin

      - name: Upload TF-A armstub
        uses: actions/upload-artifact@v4
        with:
          name: tfa-binary-${{ matrix.platform.artifact_suffix }}
          path: arm-trusted-firmware/build/${{ matrix.platform.tfa_plat }}/debug/armstub8.bin
          retention-days: 1
          if-no-files-found: error

  build-image:
    needs: [determine-version, build-uboot, checkout-firmware, build-ipxe-arm64, prepare-config, build-kernel-dtbs, build-tfa]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: write
      id-token: write

    outputs:
      image_name: ${{ steps.create_image.outputs.image_name }}
      image_size: ${{ steps.create_image.outputs.image_size }}
      release_version: ${{ needs.determine-version.outputs.release_version }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Cache and install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: dosfstools parted xz-utils
          version: 1.0

      - name: Prepare build directory
        run: |
          mkdir -p build
          mkdir -p mnt
          mkdir -p out

          # Copy U-Boot binaries
          cp artifacts/uboot-*/*.bin build/
          ls -lah build/

          # Copy config file
          cp artifacts/config-files/config.txt build/

          # Copy firmware files
          cp -r artifacts/rpi-firmware/* build/

          # Copy patched Raspberry Pi kernel device tree files (bcm2712*)
          # Built from raspberrypi/linux with upstream-compatibility patches applied
          echo "Copying patched kernel device tree files..."
          cp artifacts/kernel-dts/* build/
          echo "Kernel DTB files:"
          ls -lah build/bcm2712*

          # Copy iPXE binary
          mkdir -p build/EFI/BOOT
          cp artifacts/ipxe-arm64-binary/snp.efi build/EFI/BOOT/BOOTAA64.EFI

          # Copy TF-A armstub binaries
          # armstub8 = BL31 (padded to 128KB) + OP-TEE (tee.bin) concatenated.
          # U-Boot is loaded separately by GPU firmware as "kernel" at 0x80000.
          echo "Copying TF-A armstub binaries..."
          cp artifacts/tfa-binary-rpi4/armstub8.bin build/armstub8.bin
          cp artifacts/tfa-binary-rpi5/armstub8.bin build/armstub8-2712.bin
          echo "TF-A armstub binaries:"
          ls -lah build/armstub8-*.bin

          echo "Build directory contents:"
          ls -lah build/

      - name: Create SD card image
        id: create_image
        working-directory: out
        env:
          RELEASE_VERSION: ${{ needs.determine-version.outputs.release_version }}
        run: |
          # Calculate required size (boot files + 100MB padding)
          BOOT_SIZE=$(du -sm ../build | cut -f1)
          IMAGE_SIZE=$((BOOT_SIZE + 100))

          echo "Creating ${IMAGE_SIZE}MB image..."

          # Create image file with semantic version
          IMAGE_NAME="uboot-raspberrypi-${RELEASE_VERSION}.img"
          dd if=/dev/zero of="$IMAGE_NAME" bs=1M count=$IMAGE_SIZE status=progress

          # Create partition table with proper type for Pi 5
          # Use sfdisk to set partition type to 0x0c (W95 FAT32 LBA)
          cat > partition.sfdisk << 'SFDISK_EOF'
          label: dos
          unit: sectors
          sector-size: 512

          start=2048, type=c, bootable
          SFDISK_EOF

          sfdisk "$IMAGE_NAME" < partition.sfdisk

          # Setup loop device
          LOOP_DEVICE=$(sudo losetup --find --show --partscan "$IMAGE_NAME")
          echo "Loop device: $LOOP_DEVICE"

          # Format partition as FAT32 with explicit parameters
          sudo mkfs.vfat -F 32 -n BOOT "${LOOP_DEVICE}p1"

          # Mount and copy files
          sudo mount "${LOOP_DEVICE}p1" ../mnt
          sudo cp -rv ../build/* ../mnt/
          sudo sync
          sudo umount ../mnt

          # Cleanup
          sudo losetup -d "$LOOP_DEVICE"

          # Calculate checksums
          sha256sum "$IMAGE_NAME" > "${IMAGE_NAME}.sha256"

          # Get image info
          IMAGE_SIZE_BYTES=$(stat -c%s "$IMAGE_NAME")
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "image_size=$IMAGE_SIZE_BYTES" >> $GITHUB_OUTPUT

          ls -lh "$IMAGE_NAME"*

      - name: Compress image
        working-directory: out
        env:
          IMAGE_NAME: ${{ steps.create_image.outputs.image_name }}
        run: |
          echo "Compressing image..."
          xz -9 -T 0 "${IMAGE_NAME}"

          # Update checksum for compressed file
          sha256sum "${IMAGE_NAME}.xz" > "${IMAGE_NAME}.xz.sha256"

      - name: Create release notes
        working-directory: out
        env:
          RELEASE_VERSION: ${{ needs.determine-version.outputs.release_version }}
        run: |
          cat > release_notes.md << EOF
          # Raspberry Pi 4 U-Boot SD Card Image

          ## Components

          - **U-Boot Version**: \`${{ env.UBOOT_VERSION }}\`
          - **Release Version**: \`${RELEASE_VERSION}\`
          - **Raspberry Pi Firmware**: \`${{ env.RPI_FIRMWARE_VERSION }}\`
          - **Raspberry Pi Kernel DTBs**: \`${{ env.RPI_KERNEL_VERSION }}\`
          - **OP-TEE**: EL3 secure monitor with EDK2 StandaloneMM RPMB for secure UEFI variables
          - **Architecture**: ARM64 (aarch64)
          - **Target Device**: Raspberry Pi 4 / Raspberry Pi 5 / Raspberry Pi 400

          ## Features

          - PXE network boot support
          - DHCP client built-in
          - EFI boot support
          - USB storage boot
          - NVMe boot support (with patches)
          - iPXE network boot (snp.efi included)
          - OP-TEE secure world for UEFI variable storage (RPMB-backed)
          - Custom boot command for network-first boot

          ## Installation

          ### Using Raspberry Pi Imager

          1. Download \`${{ steps.create_image.outputs.image_name }}.xz\`
          2. Open Raspberry Pi Imager
          3. Choose "Use custom" and select the downloaded \`.xz\` file
          4. Select your SD card
          5. Write the image

          ### Using dd (Linux/macOS)

          \`\`\`bash
          # Decompress
          xz -d ${{ steps.create_image.outputs.image_name }}.xz

          # Write to SD card (replace /dev/sdX with your SD card device)
          sudo dd if=${{ steps.create_image.outputs.image_name }} of=/dev/sdX bs=4M status=progress
          sudo sync
          \`\`\`

          ## Boot Configuration

          The image includes a custom \`config.txt\` that:
          - Enables 64-bit ARM mode
          - Uses U-Boot as the kernel
          - Configures minimal GPU memory
          - Enables UART for debugging

          ## Boot Sequence

          The default boot order:
          1. Attempt USB disk boot (EFI)
          2. Attempt network boot via DHCP/PXE
          3. Fall back to local disk

          ## Verification

          Verify the image integrity:

          \`\`\`bash
          sha256sum -c ${{ steps.create_image.outputs.image_name }}.xz.sha256
          \`\`\`

          ## Image Information

          - **Uncompressed Size**: ${{ steps.create_image.outputs.image_size }} bytes
          - **Format**: Raw disk image (MBR partition table, FAT32 boot partition)

          ---

          *Built on $(date -u +"%Y-%m-%d %H:%M:%S UTC")*
          EOF

          cat release_notes.md

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpi4-uboot-image
          path: |
            out/${{ steps.create_image.outputs.image_name }}.xz
            out/${{ steps.create_image.outputs.image_name }}.xz.sha256
            out/release_notes.md
          retention-days: 30

      - name: Report build status
        env:
          RELEASE_VERSION: ${{ needs.determine-version.outputs.release_version }}
        run: |
          echo "✅ U-Boot SD card image created successfully"
          echo "📦 Image: ${{ steps.create_image.outputs.image_name }}.xz"
          echo "📏 Uncompressed size: ${{ steps.create_image.outputs.image_size }} bytes"
          echo "🔖 U-Boot version: ${{ env.UBOOT_VERSION }}"
          echo "🔖 Release version: ${RELEASE_VERSION}"
          echo "🔖 Firmware version: ${{ env.RPI_FIRMWARE_VERSION }}"

  publish-github-release:
    name: Publish GitHub Release
    needs: build-image
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpi4-uboot-image
          path: artifacts

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build-image.outputs.release_version }}
          name: Release v${{ needs.build-image.outputs.release_version }}
          body_path: artifacts/release_notes.md
          files: |
            artifacts/${{ needs.build-image.outputs.image_name }}.xz
            artifacts/${{ needs.build-image.outputs.image_name }}.xz.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-oras:
    name: Publish to ORAS Registry
    needs: build-image
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpi4-uboot-image
          path: artifacts

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1
        with:
          version: 1.2.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag or input
        id: extract_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v${{ needs.build-image.outputs.release_version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${VERSION}"

      - name: Push artifacts to ORAS
        working-directory: artifacts
        env:
          VERSION: ${{ steps.extract_version.outputs.version }}
        run: |
          # Convert repository name to lowercase for GHCR compatibility
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_BASE="ghcr.io/${REPO_LOWER}"

          echo "Publishing to: ${IMAGE_BASE}:${VERSION}"

          # Push all artifacts as a single OCI artifact
          oras push "${IMAGE_BASE}:${VERSION}" \
            --artifact-type application/vnd.tinkerbell.uboot.image.v1 \
            ${{ needs.build-image.outputs.image_name }}.xz:application/octet-stream \
            ${{ needs.build-image.outputs.image_name }}.xz.sha256:text/plain \
            release_notes.md:text/markdown

          echo "✅ Published to ${IMAGE_BASE}:${VERSION}"

          # Also tag as latest if this is a release
          if [ "${{ github.event_name }}" = "push" ]; then
            oras tag "${IMAGE_BASE}:${VERSION}" latest
            echo "✅ Tagged as latest"
          fi

      - name: Report ORAS publication
        env:
          VERSION: ${{ steps.extract_version.outputs.version }}
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "✅ Artifacts published to ORAS registry"
          echo "📦 Registry: ghcr.io/${REPO_LOWER}"
          echo "🏷️  Version: ${VERSION}"
          echo ""
          echo "To pull the artifacts:"
          echo "  oras pull ghcr.io/${REPO_LOWER}:${VERSION}"
